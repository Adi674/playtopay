services:
  - type: web
    name: playto-kyc-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python seed.py
    startCommand: gunicorn config.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.3"
